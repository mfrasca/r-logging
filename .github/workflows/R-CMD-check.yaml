name: R-CMD-check
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
permissions:
  contents: read
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            r-version: oldrel
          - os: ubuntu-latest
            r-version: release
          - os: ubuntu-latest
            r-version: devel
          - os: macos-latest
            r-version: release
          - os: windows-latest
            r-version: release
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libcurl4-openssl-dev
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: pkg
          extra-packages: any::rcmdcheck
      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: pkg
          args: 'c("--as-cran", "--no-manual")'
          error-on: '"error"'
